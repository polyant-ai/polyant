name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:unit -w @polyant/engine

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image: migration 0000 runs `CREATE EXTENSION vector`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: polyant
          POSTGRES_PASSWORD: test
          POSTGRES_DB: polyant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polyant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # migrate.ts runs outside vitest, so it does not load test-setup.ts —
      # supply the config.ts-required vars (and DB coordinates) at the job level.
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: polyant
      POSTGRES_PASSWORD: test
      POSTGRES_DB: polyant
      AUTH_SECRET: test-secret-at-least-32-chars-long-yes
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:migrate -w @polyant/engine
      - run: npm run test:integration -w @polyant/engine

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
